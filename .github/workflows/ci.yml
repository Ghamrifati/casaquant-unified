name: CasaQuant Unified CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check app tests
      - name: Ruff format check
        run: ruff format --check app tests
      - name: MyPy type check
        run: mypy app

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cq
          POSTGRES_PASSWORD: cq_secret
          POSTGRES_DB: casaquant_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://cq:cq_secret@localhost:5432/casaquant_test
          REDIS_URL: redis://localhost:6379/1
        run: alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql://cq:cq_secret@localhost:5432/casaquant_test
          REDIS_URL: redis://localhost:6379/1
          CASAQUANT_ENV: development
        run: pytest -m "not slow and not e2e" --cov=app --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
